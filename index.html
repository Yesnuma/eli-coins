<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eli's Coins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, getDoc, setDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  const firebaseConfig = {
    apiKey: "AIzaSyAoKokKZzCGfOHEJAQ0dJzzqkhnN_AtYdQ",
    authDomain: "eli-coins.firebaseapp.com",
    projectId: "eli-coins",
    storageBucket: "eli-coins.firebasestorage.app",
    messagingSenderId: "729625314825",
    appId: "1:729625314825:web:bb59e33debf0ba409e1ad8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  setPersistence(auth, browserLocalPersistence).catch(()=>{});
  window.FB = { db, collection, getDocs, getDoc, setDoc, deleteDoc, doc };
  window.AUTH = {
    auth,
    signIn:(email,pw)=>signInWithEmailAndPassword(auth,email,pw),
    signOut:()=>signOut(auth),
    onChange:(cb)=>onAuthStateChanged(auth,cb)
  };
  window.dispatchEvent(new Event('fb-ready'));
</script>
<style>
  :root{--bg:#f4efe7;--card:#fffdf9;--ink:#1c1814;--soft:#6b6256;--line:#e2d9c9;--blue:#0600FF;--pink:#FF007A;--chip:#efe7d8;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,system-ui,sans-serif;line-height:1.45;}
  [dir=rtl]{direction:rtl;}
  .app{max-width:760px;margin:0 auto;padding-bottom:90px;}

  /* top bar */
  .top{position:sticky;top:0;z-index:20;background:var(--bg);padding:14px 16px 8px;border-bottom:1px solid var(--line);}
  .titlerow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .title{font-family:Georgia,serif;font-weight:700;font-size:24px;}
  .lang{font-family:'Courier New',monospace;font-size:12px;border:1px solid var(--ink);border-radius:20px;overflow:hidden;display:flex;flex:none;}
  .lang button{font:inherit;border:none;background:transparent;padding:6px 12px;cursor:pointer;color:var(--soft);}
  .lang button.on{background:var(--ink);color:var(--bg);}
  .search{margin-top:10px;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;}
  .search input{flex:1;border:none;background:transparent;font-size:16px;color:var(--ink);outline:none;}
  .search .ic{color:var(--soft);}

  /* tabs */
  .tabs{display:flex;gap:6px;margin-top:10px;}
  .tab{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.04em;text-transform:uppercase;padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--soft);cursor:pointer;}
  .tab.on{background:var(--ink);color:var(--bg);border-color:var(--ink);}

  /* tag rail */
  .tagrail{display:flex;gap:7px;overflow-x:auto;padding:12px 16px 6px;scrollbar-width:none;}
  .tagrail::-webkit-scrollbar{display:none;}
  .chip{flex:none;font-family:'Courier New',monospace;font-size:12.5px;padding:7px 13px;border-radius:20px;background:var(--chip);color:var(--ink);cursor:pointer;border:1px solid transparent;white-space:nowrap;}
  .chip.on{background:var(--blue);color:#fff;}
  .chip.clear{background:transparent;border:1px solid var(--pink);color:var(--pink);}

  .meta-line{padding:2px 16px 0;font-family:'Courier New',monospace;font-size:11.5px;color:var(--soft);display:flex;justify-content:space-between;align-items:center;}
  .savecol{font-family:'Courier New',monospace;font-size:11.5px;color:var(--blue);cursor:pointer;border:none;background:none;font-weight:bold;}

  /* coin grid */
  .grid{padding:10px 16px;display:grid;grid-template-columns:1fr;gap:10px;}
  .coin-card{display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;transition:transform .12s;}
  .coin-card:active{transform:scale(.99);}
  .coin-card .nm{font-family:Georgia,serif;font-weight:700;font-size:17px;line-height:1.15;}
  .coin-card .mt{font-size:13px;color:var(--soft);margin-top:1px;}
  .coin-card .tg{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
  .coin-card .tg span{font-family:'Courier New',monospace;font-size:10.5px;background:var(--chip);color:var(--soft);padding:2px 7px;border-radius:10px;}
  .coin-card .vl{margin-inline-start:auto;font-family:'Courier New',monospace;font-size:12px;color:var(--pink);font-weight:bold;flex:none;align-self:flex-start;white-space:nowrap;max-width:42%;overflow:hidden;text-overflow:ellipsis;}
  .empty{text-align:center;color:var(--soft);padding:50px 20px;font-style:italic;}

  /* coin faces */
  .face{flex:none;width:62px;height:62px;display:flex;align-items:center;justify-content:center;}
  .coin{width:60px;height:60px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-weight:700;overflow:hidden;border:1px solid rgba(0,0,0,.25);box-shadow:0 2px 5px rgba(0,0,0,.18);}
  .coin .yr{font-size:13px;}.coin small{display:block;font-family:'Courier New',monospace;font-size:7px;letter-spacing:.06em;opacity:.7;}
  .coin::after{content:'';position:absolute;inset:0;border-radius:50%;box-shadow:inset 0 0 0 2px rgba(255,255,255,.2),inset 0 -5px 9px rgba(0,0,0,.35);}
  .gold{background:radial-gradient(circle at 38% 30%,#f7e69a,#c99b4d 55%,#876327);color:#5e451c;}
  .silver{background:radial-gradient(circle at 38% 30%,#fbfcfe,#c4cad2 55%,#868d97);color:#454c56;}
  .copper{background:radial-gradient(circle at 38% 30%,#edb389,#b5703f 55%,#7e4622);color:#5a3018;}
  .note{width:62px;height:40px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;font-weight:700;font-size:13px;border:1px solid rgba(0,0,0,.25);}
  .note small{font-family:'Courier New',monospace;font-size:7px;opacity:.8;}
  .ngreen{background:linear-gradient(135deg,#bfe3cc,#8fc3a4);color:#28503a;}
  .ngold{background:linear-gradient(135deg,#f0e4bf,#c9af6e);color:#6a521f;}
  .ngray{background:linear-gradient(135deg,#d8d2c4,#b3aa95);color:#473f2c;}
  .face img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:1px solid rgba(0,0,0,.25);box-shadow:0 2px 5px rgba(0,0,0,.18);}

  /* iOS-style multi-select */
  .selcircle{flex:none;width:24px;height:24px;border-radius:50%;border:2px solid var(--soft);align-self:center;}
  .selcircle.on{background:var(--blue);border-color:var(--blue);position:relative;}
  .selcircle.on::after{content:'✓';color:#fff;font-size:14px;font-weight:bold;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .coin-card.sel{border-color:var(--blue);background:#f1f0ff;}
  .selbar{position:fixed;bottom:0;left:0;right:0;z-index:31;background:var(--card);border-top:1px solid var(--line);
    padding:14px 18px calc(16px + env(safe-area-inset-bottom));display:none;align-items:center;justify-content:space-between;max-width:760px;margin:0 auto;}
  .selbar span{font-family:'Courier New',monospace;font-size:14px;color:var(--ink);}
  .selbar button{background:var(--blue);color:#fff;border:none;border-radius:22px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
  .selbar button:disabled{opacity:.35;}
  .selbar .selall{background:transparent;color:var(--blue);border:none;padding:8px 2px;font-size:15px;font-weight:700;}

  /* floating add button */
  .fab{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:30;background:var(--blue);color:#fff;border:none;border-radius:30px;
    font-size:16px;font-weight:600;padding:15px 26px;box-shadow:0 8px 22px -6px rgba(6,0,255,.55);cursor:pointer;display:flex;gap:8px;align-items:center;}
  .fab:active{transform:translateX(-50%) translateY(1px);}

  /* modal */
  .modal{position:fixed;inset:0;z-index:40;background:rgba(20,16,12,.5);display:none;align-items:flex-end;justify-content:center;}
  .modal.show{display:flex;}
  .sheet{background:var(--bg);width:100%;max-width:760px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 18px 40px;}
  .sheet h3{font-family:Georgia,serif;font-size:21px;margin-bottom:2px;}
  .sheet .x{float:inline-end;font-size:24px;background:none;border:none;color:var(--soft);cursor:pointer;line-height:1;}
  .addbtn{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;border:2px dashed var(--ink);border-radius:14px;padding:24px;cursor:pointer;background:var(--card);margin:6px 0 12px;}
  .addbtn .p{font-size:34px;color:var(--blue);line-height:1;}
  .addbtn .s{font-family:'Courier New',monospace;font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;}
  input[type=file]{display:none;}
  .status{text-align:center;font-family:'Courier New',monospace;font-size:13px;color:var(--blue);padding:14px;}
  .err{border:1px solid var(--pink);background:#fff;border-radius:10px;padding:12px;color:var(--pink);font-size:13px;font-family:'Courier New',monospace;margin:6px 0;}
  .preview{display:flex;gap:14px;align-items:center;margin:6px 0 12px;}
  .field{margin:8px 0;}
  .field label{display:block;font-family:'Courier New',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--soft);margin-bottom:3px;}
  .field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:15px;background:var(--card);color:var(--ink);font-family:inherit;}
  .field textarea{min-height:64px;resize:vertical;}
  .tagedit{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .tagedit .t{font-family:'Courier New',monospace;font-size:12px;background:var(--chip);padding:5px 10px;border-radius:14px;display:flex;gap:6px;align-items:center;}
  .tagedit .t b{cursor:pointer;color:var(--pink);font-weight:bold;}
  .tagedit input{flex:1;min-width:100px;border:none;background:transparent;outline:none;font-family:'Courier New',monospace;font-size:13px;padding:6px;}
  .suggest{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;}
  .suggest span{font-family:'Courier New',monospace;font-size:11.5px;border:1px dashed var(--soft);color:var(--soft);padding:4px 9px;border-radius:12px;cursor:pointer;}
  .row2{display:flex;gap:10px;margin-top:16px;}
  .row2 button{flex:1;border-radius:11px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;border:1px solid var(--ink);}
  .primary{background:var(--blue);color:#fff;border-color:var(--blue);}
  .ghost{background:transparent;color:var(--ink);}
  .blurb{font-size:14.5px;line-height:1.55;color:#2a241d;margin:6px 0;}
  .selrow{display:flex;gap:8px;align-items:center;margin-top:10px;}
  .selrow select{flex:1;padding:10px;border-radius:9px;border:1px solid var(--line);background:var(--card);font-size:14px;}

  /* collections */
  .col-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:0 16px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .col-card .cn{font-family:Georgia,serif;font-weight:700;font-size:18px;}
  .col-card .cc{font-family:'Courier New',monospace;font-size:12px;color:var(--soft);}
  /* ===== legibility pass: one clean font for EN + HE, bigger sizes for older eyes ===== */
  *{font-family:'Heebo',-apple-system,system-ui,sans-serif !important;}
  body{font-size:17px;}
  .title{font-size:30px;font-weight:800;}
  .search input{font-size:18px;}
  .search .ic{font-size:18px;}
  .tab{font-size:14px;font-weight:600;letter-spacing:0;padding:9px 16px;}
  .chip{font-size:15px;padding:10px 16px;font-weight:500;}
  .meta-line{font-size:14px;}
  .savecol{font-size:15px;font-weight:700;}
  .coin-card{padding:14px;gap:16px;}
  .coin-card .nm{font-size:21px;font-weight:700;}
  .coin-card .mt{font-size:16px;color:#4a4339;margin-top:2px;}
  .coin-card .tg span{font-size:13.5px;padding:4px 10px;}
  .coin-card .vl{font-size:15px;font-weight:700;}
  .sheet h3{font-size:24px;font-weight:700;}
  .field label{font-size:13.5px;font-weight:700;}
  .field input,.field textarea{font-size:18px;}
  .tagedit .t{font-size:15px;}
  .fab{font-size:19px;font-weight:700;}
  .selbar span{font-size:16px;font-weight:600;}
  .blurb{font-size:17px;line-height:1.6;}
  .coin{border:1px solid rgba(0,0,0,.25);}

  /* ===== collections as photo albums ===== */
  .albums{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .album{cursor:pointer;}
  .album .cover{aspect-ratio:1/1;border-radius:18px;background:var(--card);border:1px solid var(--line);
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;padding:14px;overflow:hidden;
    box-shadow:0 6px 16px -10px rgba(0,0,0,.25);}
  .album .cover .cell{display:flex;align-items:center;justify-content:center;}
  .album .cover .coin{width:48px !important;height:48px !important;}
  .album .cover .note{width:50px !important;height:32px !important;font-size:12px !important;}
  .album .cover img{width:48px !important;height:48px !important;}
  .album .cover .face{width:auto;height:auto;}
  .album.newcol .cover{border:2px dashed var(--blue);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:46px;font-weight:700;}
  .album .an{font-size:18px;font-weight:700;margin-top:10px;}
  .album .ac{font-size:14px;color:var(--soft);}

  /* in-album add button + coin picker */
  .addcoins{display:block;width:calc(100% - 32px);margin:6px 16px 14px;border:2px dashed var(--blue);color:var(--blue);
    background:rgba(6,0,255,.05);border-radius:16px;padding:17px;font-size:18px;font-weight:700;cursor:pointer;text-align:center;}
  .dlbtn{display:block;width:calc(100% - 32px);margin:-6px 16px 14px;border:2px solid var(--pink);color:var(--pink);
    background:#fff;border-radius:16px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;text-align:center;}
  .dlbtn:disabled{opacity:.5;}
  .existbtn{display:block;width:calc(100% - 32px);margin:-6px 16px 14px;border:1px solid var(--line);color:var(--soft);
    background:var(--card);border-radius:16px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;}
  .pickrow{display:flex;align-items:center;gap:16px;padding:13px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
  .pickrow .pn{font-size:18px;font-weight:600;}
  .pickrow .pm{font-size:14px;color:var(--soft);}
  .pickrow .coin{width:48px;height:48px;}
  .pickrow .note{width:50px;height:32px;}

  /* ===== cover splash ===== */
  #splash{position:fixed;inset:0;z-index:999;background:#26201a;display:flex;flex-direction:column;
    align-items:center;justify-content:center;cursor:pointer;transition:opacity .5s ease;}
  #splash img{width:100%;height:100%;object-fit:cover;}
  #splash .tap{position:absolute;bottom:max(24px,env(safe-area-inset-bottom));left:0;right:0;text-align:center;
    color:#f4efe7;font-size:15px;font-weight:600;letter-spacing:.03em;opacity:.92;
    text-shadow:0 1px 4px rgba(0,0,0,.6);animation:pulse 1.8s ease-in-out infinite;pointer-events:none;}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  #splash.gone{opacity:0;pointer-events:none;}
  #splash.shake{animation:shk .4s;}
  @keyframes shk{0%,100%{transform:none}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
  .gate{position:absolute;bottom:max(38px,env(safe-area-inset-bottom));left:0;right:0;display:none;
    flex-direction:column;align-items:center;gap:11px;padding:0 24px;}
  .gate input{width:min(320px,82%);padding:14px 16px;border-radius:13px;border:none;font-size:17px;text-align:center;
    background:rgba(255,255,255,.96);box-shadow:0 4px 14px rgba(0,0,0,.3);}
  .gate button{background:var(--blue);color:#fff;border:none;border-radius:24px;padding:13px 30px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  .pwerr{color:#fff;background:rgba(255,0,122,.92);padding:5px 13px;border-radius:11px;font-size:13px;font-weight:600;}
  .pwerr:empty{display:none;}

  /* ===== photo lightbox (tap a coin photo to enlarge) ===== */
  .zoomable{position:relative;cursor:zoom-in;}
  .zoomable::after{content:'⤢';position:absolute;right:-3px;bottom:-3px;background:var(--blue);color:#fff;
    font-size:11px;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  #lightbox{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.93);display:none;align-items:center;justify-content:center;overflow:auto;}
  #lightbox.show{display:flex;}
  #lightbox img{max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in;}
  #lightbox.zoom{align-items:flex-start;justify-content:flex-start;}
  #lightbox.zoom img{max-width:none;max-height:none;width:210%;cursor:zoom-out;}
  #lightbox .lx{position:fixed;top:max(14px,env(safe-area-inset-top));right:18px;font-size:30px;color:#fff;
    background:rgba(0,0,0,.4);border:none;z-index:1001;cursor:pointer;line-height:1;width:44px;height:44px;border-radius:50%;}

  /* ===== view toggle (list vs photo grid) ===== */
  .vtoggle{display:flex;gap:0;margin-inline-start:auto;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--card);}
  .vtoggle button{font:inherit;border:none;background:transparent;padding:7px 13px;font-size:16px;color:var(--soft);cursor:pointer;}
  .vtoggle button.on{background:var(--ink);color:var(--bg);}

  /* ===== iPhone-album photo grid ===== */
  .photos{padding:3px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;}
  .ptile{position:relative;aspect-ratio:1/1;background:#e8e0d2;overflow:hidden;cursor:pointer;border-radius:3px;}
  .ptile img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
  .ptile .drawn{width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;transform:scale(1.15);}
  .ptile.sortable-ghost{opacity:.3;}
  .ptile.sortable-chosen{transform:scale(.94);box-shadow:0 6px 16px rgba(0,0,0,.35);z-index:5;}
  .rehint{padding:8px 16px 2px;font-size:13px;color:var(--soft);font-style:italic;}

  /* ===== background bulk-upload progress pill ===== */
  .batchchip{position:fixed;top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:45;
    background:var(--ink);color:var(--bg);border-radius:22px;padding:10px 18px;font-size:14px;font-weight:600;
    display:none;align-items:center;gap:10px;box-shadow:0 8px 22px -6px rgba(0,0,0,.5);max-width:90vw;}
  .batchchip .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;flex:none;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ===== collection total ===== */
  .worth{margin-top:10px;background:var(--blue);color:#fff;border-radius:13px;padding:11px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .worth .lab{font-size:13px;font-weight:600;opacity:.9;text-transform:uppercase;letter-spacing:.04em;}
  .worth .amt{font-size:20px;font-weight:800;}
  .worth:empty{display:none;}
</style>
</head>
<body>
<div id="lightbox"><button class="lx" onclick="closePhoto()">×</button><img id="lightboximg" alt=""></div>
<div id="splash">
  <img src="cover.jpg" alt="The Coin Collector Times">
  <div class="tap" id="taphint" style="display:none">tap to enter ›</div>
  <div class="gate" id="gate">
    <input id="pw-email" type="email" inputmode="email" autocapitalize="off" autocomplete="username" placeholder="Email">
    <input id="pw" type="password" autocomplete="current-password" placeholder="Password" onkeydown="if(event.key==='Enter')tryEnter()">
    <button onclick="tryEnter()">Enter ›</button>
    <div class="pwerr" id="pwerr"></div>
  </div>
</div>
<div class="app">
  <div class="top">
    <div class="titlerow">
      <div class="title" id="apptitle">Eli&rsquo;s Coins</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="lang">
          <button id="l-en" class="on" onclick="setLang('en')">EN</button>
          <button id="l-he" onclick="setLang('he')">עב</button>
        </div>
        <button onclick="logout()" title="Sign out" style="border:1px solid var(--line);background:var(--card);border-radius:50%;width:38px;height:38px;font-size:16px;cursor:pointer;line-height:1">🔒</button>
      </div>
    </div>
    <div class="worth" id="worth"></div>
    <div class="search">

      <input id="q" placeholder="Search" oninput="render()">

      <div class="tab" id="tab-col" onclick="setView('collections')">Collections</div>

<script>
/* ---------- i18n (interface only; content stays English) ---------- */
const T={

    catal:"מקטלג",added:"נוספו",skipped:"דולגו",bulkhint:"אפשר לבחור כמה תמונות יחד — הן יועלו ברקע",draghint:"החזיקו וגררו תמונה כדי לסדר מחדש",download:"הורדת תמונות",nophotos:"אין עדיין תמונות להורדה באוסף הזה.",dragcol:"החזיקו וגררו כדי לסדר אוספים",addinto:"מוסיף אל",addexisting:"או בחרו ממטבעות שכבר יש לכם"}
};
let lang='en';
const t=k=>T[lang][k];

/* tag DISPLAY translations — value stays English (so filtering never fragments), label shows Hebrew */
const HE_TAGS={coin:"מטבע",bill:"שטר",gold:"זהב",silver:"כסף",copper:"נחושת",bronze:"ארד",paper:"נייר",ancient:"עתיק",greek:"יווני",
  roman:"רומי",judea:"יהודה",graded:"מדורג",us:'ארה"ב',dollars:"דולרים",dollar:"דולר",cents:"סנטים",
  currency:"שטרות",shipwreck:"ספינה טרופה",confederate:"קונפדרציה","1700s":"המאה ה-18","1800s":"המאה ה-19",
  "1900s":"המאה ה-20","carson city":"קרסון סיטי"};
const tagLabel=tg=>(lang==='he'?(HE_TAGS[tg]||tg):tg);
/* isolate English/number text so it reads correctly inside a right-to-left page */
const ltr=s=>'<span dir="ltr" style="unicode-bidi:isolate">'+esc(s)+'</span>';

function showBlurb(c){
  const el=document.getElementById('d-blurb');if(!el)return;
  if(lang==='he'&&(c.blurb_he||c._heBlurb)){el.textContent=c.blurb_he||c._heBlurb;return;}
  el.textContent=c.blurb||'';
}

/* ---------- data (loads from / saves to Firebase) ---------- */
let coins=[];
let collections=[];
let meta={coinOrder:[],colOrder:[]};
let nextCoinId=100, nextColId=10;

let activeTags=new Set(), view='all', currentCol=null, displayMode='list';
let selectMode=false, selected=new Set();

/* ---------- Firebase persistence (free Spark plan; photos stored in the doc) ---------- */
async function loadFromFirestore(){
  if(!window.FB)return;
  try{
    const {db,collection,getDocs}=window.FB;
    const cs=await getDocs(collection(db,'coins'));
    coins=cs.docs.map(d=>d.data()).sort((a,b)=>(b.created||0)-(a.created||0));
    const cols=await getDocs(collection(db,'collections'));
    collections=[];meta={coinOrder:[],colOrder:[]};
    cols.docs.forEach(d=>{ if(d.id==='__meta__'){meta=Object.assign({coinOrder:[],colOrder:[]},d.data());} else collections.push(d.data()); });
    nextCoinId=Math.max(99,...coins.map(c=>+c.id||0))+1;
    nextColId=Math.max(9,...collections.map(c=>+c.id||0))+1;
    // apply saved manual orders
    if(Array.isArray(meta.coinOrder)&&meta.coinOrder.length){const pos={};meta.coinOrder.forEach((id,i)=>pos[id]=i);coins.sort((a,b)=>((pos[a.id]??9e9)-(pos[b.id]??9e9)));}
    if(Array.isArray(meta.colOrder)&&meta.colOrder.length){const pos={};meta.colOrder.forEach((id,i)=>pos[id]=i);collections.sort((a,b)=>((pos[a.id]??9e9)-(pos[b.id]??9e9)));}
  }catch(e){console.error('Firestore load failed',e);}
}
function saveMeta(){if(!window.FB)return;const{db,setDoc,doc}=window.FB;setDoc(doc(db,'collections','__meta__'),meta).catch(e=>console.error('save meta',e));}
function saveOrder(){meta.coinOrder=coins.map(c=>c.id);saveMeta();}
function saveColOrder(){meta.colOrder=collections.map(c=>c.id);saveMeta();}
function persistCoin(c){if(!window.FB)return;const{db,setDoc,doc}=window.FB;setDoc(doc(db,'coins',String(c.id)),c).catch(e=>console.error('save coin',e));}
function removeCoinDoc(id){if(!window.FB)return;const{db,deleteDoc,doc}=window.FB;deleteDoc(doc(db,'coins',String(id))).catch(e=>console.error('del coin',e));}
function persistCol(col){if(!window.FB)return;const{db,setDoc,doc}=window.FB;setDoc(doc(db,'collections',String(col.id)),col).catch(e=>console.error('save col',e));}
function removeColDoc(id){if(!window.FB)return;const{db,deleteDoc,doc}=window.FB;deleteDoc(doc(db,'collections',String(id))).catch(e=>console.error('del col',e));}

/* ---------- helpers ---------- */
function faceHTML(c){
  if(c.img) return '<span class="face"><img src="'+c.img+'"></span>';
  const f=c.face||{k:"coin silver",g:"?",s:""};
  if(f.k.startsWith("note")) return '<span class="face"><span class="'+f.k+'">'+f.g+'<small>'+f.s+'</small></span></span>';
  return '<span class="face"><span class="'+f.k+'"><span><span class="yr">'+f.g+'</span><small>'+f.s+'</small></span></span></span>';
}
function allTags(){const s={};coins.forEach(c=>c.tags.forEach(tg=>s[tg]=(s[tg]||0)+1));return Object.keys(s).sort((a,b)=>s[b]-s[a]);}
function matches(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  return coins.filter(c=>{
    for(const tg of activeTags) if(!c.tags.includes(tg)) return false;
    if(q){const hay=(c.name+' '+c.country+' '+c.year+' '+c.mint+' '+c.tags.join(' ')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
}

/* ---------- render ---------- */
/* ---------- collection total worth ---------- */
function parseRange(str){
  const nums=(String(str||'').match(/\d[\d,]*(?:\.\d+)?/g)||[]).map(n=>parseFloat(n.replace(/,/g,'')));
  if(!nums.length)return null;
  return [Math.min(...nums),Math.max(...nums)];
}
function money(n){return '$'+Math.round(n).toLocaleString('en-US');}
/* keep only the price range part of a value, e.g. "~$2-$50 per coin, depending…" -> "~$2-$50" */
function shortValue(v){
  v=(v||'').toString().trim();
  if(!v) return '';
  const m=v.match(/~?\s*\$?\s*\d[\d,]*(?:\.\d+)?\s*(?:[-–—]|to)\s*\$?\s*\d[\d,]*(?:\.\d+)?/i)
        || v.match(/~?\s*\$?\s*\d[\d,]*(?:\.\d+)?/);
  if(m) return m[0].replace(/\s*([-–—])\s*/,'$1').replace(/\s+/g,' ').trim();
  return v.split(/,| per | each | depending/i)[0].trim();
}
function updateTotal(){
  const el=document.getElementById('worth');if(!el)return;
  let lo=0,hi=0,counted=0;
  coins.forEach(c=>{const r=parseRange(c.value);if(r){lo+=r[0];hi+=r[1];counted++;}});
  if(!counted){el.innerHTML='';return;}
  const amt=(Math.round(lo)===Math.round(hi))?('≈ '+money(lo)):(money(lo)+'–'+money(hi));
  el.innerHTML='<span class="lab">'+t('worth')+'</span><span class="amt" dir="ltr">'+amt+'</span>';
}

function render(){
  document.getElementById('apptitle').innerHTML=lang==='en'?"Eli&rsquo;s Coins":t('title');
  document.getElementById('q').placeholder=t('search');
  document.getElementById('tab-all').textContent=t('all');
  document.getElementById('tab-col').textContent=t('collections');
  document.getElementById('fab-t').textContent=t('add');
  document.getElementById('savecol').textContent=t('save_col');
  updateTotal();

  // view toggle only shows on All-coins
  document.getElementById('vtoggle').style.display=(view==='all')?'flex':'none';
  document.getElementById('v-list').classList.toggle('on',displayMode==='list');
  document.getElementById('v-photo').classList.toggle('on',displayMode==='photo');

  if(view==='collections'){selectMode=false;updateSelChrome();renderCollections();document.getElementById('tagwrap').style.display='none';return;}
  document.getElementById('tagwrap').style.display='block';

  // tag rail
  const tags=allTags();
  let rail='';
  if(activeTags.size) rail+='<div class="chip clear" onclick="clearTags()">✕ '+t('clear')+'</div>';
  rail+=tags.map(tg=>'<div class="chip '+(activeTags.has(tg)?'on':'')+'" onclick="toggleTag(\''+tg+'\')">'+esc(tagLabel(tg))+'</div>').join('');
  document.getElementById('tagrail').innerHTML=rail;

  const list=matches();
  document.getElementById('count').textContent=list.length+' '+t('coins');
  document.getElementById('savecol').style.display=(!selectMode&&displayMode==='list'&&(activeTags.size||document.getElementById('q').value))?'block':'none';
  document.getElementById('selectbtn').textContent=selectMode?t('done'):t('select');
  document.getElementById('selectbtn').style.display=(displayMode==='photo')?'none':'';
  updateSelChrome();

  if(displayMode==='photo'){ renderPhotos(list); return; }

  document.getElementById('main').innerHTML='<div class="grid">'+(
    list.length?list.map(coinCard).join(''):'<div class="empty">'+t('none')+'</div>'
  )+'</div>';
}
function renderPhotos(list){
  const canReorder = !activeTags.size && !document.getElementById('q').value.trim();
  const tiles=list.map(c=>{
    const inner = c.img ? '<img src="'+c.img+'">' : '<span class="drawn">'+faceHTML(c)+'</span>';
    return '<div class="ptile" data-id="'+c.id+'" onclick="openDetail('+c.id+')">'+inner+'</div>';
  }).join('');
  const hint = (canReorder && list.length>1) ? '<div class="rehint">'+t('draghint')+'</div>' : '';
  document.getElementById('main').innerHTML = list.length
    ? hint+'<div class="photos" id="photogrid">'+tiles+'</div>'
    : '<div class="empty">'+t('none')+'</div>';
  if(canReorder) initPhotoSort();
}
let _sortable=null;
function initPhotoSort(){
  const grid=document.getElementById('photogrid');
  if(!grid||!window.Sortable)return;
  if(_sortable){try{_sortable.destroy();}catch(_){ }_sortable=null;}
  _sortable=window.Sortable.create(grid,{
    animation:150, delay:220, delayOnTouchOnly:true, touchStartThreshold:6,
    onEnd:()=>{
      const ids=[...grid.children].map(el=>+el.dataset.id).filter(x=>!isNaN(x));
      const pos={};ids.forEach((id,i)=>pos[id]=i);
      coins.sort((a,b)=>((pos[a.id]??9e9)-(pos[b.id]??9e9)));
      saveOrder();
    }
  });
}
function coinCard(c){
  const check = selectMode ? '<span class="selcircle '+(selected.has(c.id)?'on':'')+'"></span>' : '';
  const click = selectMode ? 'toggleSelect('+c.id+')' : 'openDetail('+c.id+')';
  return '<div class="coin-card'+(selectMode&&selected.has(c.id)?' sel':'')+'" onclick="'+click+'">'+check+faceHTML(c)+
    '<div><div class="nm">'+esc(c.name)+'</div><div class="mt">'+ltr([c.mint,c.year].filter(x=>x&&x!=='—').join(' · '))+'</div>'+
    '<div class="tg">'+c.tags.slice(0,4).map(tg=>'<span>'+esc(tagLabel(tg))+'</span>').join('')+'</div></div>'+
    '<div class="vl">'+ltr(shortValue(c.value))+'</div></div>';
}
function renderCollections(){
  document.getElementById('count').textContent='';
  let html=(collections.length>1?'<div class="rehint">'+t('dragcol')+'</div>':'')+'<div class="albums" id="albumgrid">';
  collections.forEach(col=>{
    const cs=coins.filter(c=>col.coinIds.includes(c.id)).slice(0,4);
    const cover=cs.length?cs.map(c=>'<div class="cell">'+faceHTML(c)+'</div>').join(''):'<div class="cell" style="grid-column:1/3;grid-row:1/3;color:var(--soft);font-size:30px">♢</div>';
    html+='<div class="album" data-id="'+col.id+'" onclick="openCollection('+col.id+')"><div class="cover">'+cover+'</div>'+
      '<div class="an">'+esc(col.name)+'</div><div class="ac">'+col.coinIds.length+' '+t('coins')+'</div></div>';
  });
  html+='</div>';
  html+='<div class="albums" style="padding-top:0"><div class="album newcol" onclick="newAlbum()"><div class="cover">＋</div><div class="an">'+t('newalbum')+'</div><div class="ac">&nbsp;</div></div></div>';
  document.getElementById('main').innerHTML=html;
  initAlbumSort();
}
let _albumSort=null;
function initAlbumSort(){
  const grid=document.getElementById('albumgrid');
  if(!grid||!window.Sortable||collections.length<2)return;
  if(_albumSort){try{_albumSort.destroy();}catch(_){ }_albumSort=null;}
  _albumSort=window.Sortable.create(grid,{animation:150,delay:220,delayOnTouchOnly:true,touchStartThreshold:6,
    onEnd:()=>{
      const ids=[...grid.children].map(el=>+el.dataset.id).filter(x=>!isNaN(x));
      const pos={};ids.forEach((id,i)=>pos[id]=i);
      collections.sort((a,b)=>((pos[a.id]??9e9)-(pos[b.id]??9e9)));
      saveColOrder();
    }
  });
}
function openCollection(id){
  const col=collections.find(c=>c.id===id);if(!col)return;currentCol=id;selectMode=false;
  view='all';document.getElementById('tab-all').classList.remove('on');document.getElementById('tab-col').classList.add('on');
  document.getElementById('tagwrap').style.display='block';
  document.getElementById('tagrail').innerHTML='<div class="chip clear" onclick="exitCollection()">‹ '+esc(col.name)+'</div>';
  document.getElementById('count').textContent=col.coinIds.length+' '+t('coins');
  document.getElementById('savecol').style.display='none';
  document.getElementById('selectbtn').style.display='none';
  document.getElementById('vtoggle').style.display='flex';
  document.getElementById('v-list').classList.toggle('on',displayMode==='list');
  document.getElementById('v-photo').classList.toggle('on',displayMode==='photo');
  updateSelChrome();
  const list=coins.filter(c=>col.coinIds.includes(c.id));
  const upBtn='<button class="addcoins" onclick="openAdd('+id+')">＋ '+t('add')+'</button>';
  const exBtn='<button class="existbtn" onclick="openAddCoinsTo('+id+')">'+t('addexisting')+'</button>';
  let body;
  if(displayMode==='photo'){
    const tiles=list.map(c=>{const inner=c.img?'<img src="'+c.img+'">':'<span class="drawn">'+faceHTML(c)+'</span>';return '<div class="ptile" data-id="'+c.id+'" onclick="openDetail('+c.id+')">'+inner+'</div>';}).join('');
    body=list.length?'<div class="photos">'+tiles+'</div>':'<div class="empty">'+t('tapadd')+'</div>';
  }else{
    body='<div class="grid">'+(list.length?list.map(coinCard).join(''):'<div class="empty">'+t('tapadd')+'</div>')+'</div>';
  }
  document.getElementById('main').innerHTML=upBtn+exBtn+body;
}
function exitCollection(){currentCol=null;document.getElementById('vtoggle').style.display='none';setView('collections');}

function toggleTag(tg){activeTags.has(tg)?activeTags.delete(tg):activeTags.add(tg);render();}
function clearTags(){activeTags.clear();render();}
function setView(v){currentCol=null;view=v;document.getElementById('tab-all').classList.toggle('on',v==='all');document.getElementById('tab-col').classList.toggle('on',v==='collections');render();}
function setDisplay(m){displayMode=m;if(m==='photo')selectMode=false;if(currentCol){openCollection(currentCol);}else{render();}}
function setLang(l){lang=l;document.documentElement.dir=(l==='he')?'rtl':'ltr';document.getElementById('l-en').classList.toggle('on',l==='en');document.getElementById('l-he').classList.toggle('on',l==='he');render();}
const esc=s=>(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ---------- save-as-collection ---------- */
function openSaveCollection(){
  const list=matches();const ids=list.map(c=>c.id);
  showSheet('<button class="x" onclick="closeModal()">×</button><h3>'+t('save_col').replace('✦ ','')+'</h3>'+
    '<p style="color:var(--soft);font-size:13px;margin:4px 0 12px">'+list.length+' '+t('coins')+'</p>'+
    '<div class="field"><input id="colname" placeholder="'+t('newcol')+'"></div>'+
    '<div class="row2"><button class="ghost" onclick="closeModal()">'+t('discard')+'</button>'+
    '<button class="primary" onclick="createCollection(['+ids.join(',')+'])">'+t('create')+'</button></div>');
  setTimeout(()=>document.getElementById('colname').focus(),50);
}
function createCollection(ids){
  const name=(document.getElementById('colname').value||'').trim();if(!name)return;
  const col={id:nextColId++,name,coinIds:ids};collections.push(col);persistCol(col);closeModal();setView('collections');
}

/* ---------- detail / edit ---------- */
let editing=null;
function openDetail(id){
  const c=coins.find(x=>x.id===id);if(!c)return;editing=c;
  const colOpts=collections.map(col=>'<option value="'+col.id+'">'+esc(col.name)+'</option>').join('');
  showSheet('<button class="x" onclick="closeModal()">×</button>'+
    '<div class="preview">'+(c.img?faceHTML(c).replace('class="face"','class="face zoomable" onclick="openPhotoFor('+c.id+')"'):faceHTML(c))+'<div><h3>'+esc(c.name)+'</h3><div style="color:var(--soft);font-size:13px">'+ltr([c.country,c.year].filter(Boolean).join(' · '))+'</div></div></div>'+
    '<div class="blurb" id="d-blurb">'+esc(c.blurb||'')+'</div>'+
    field('Name','d-name',c.name)+
    grid2(field('Country','d-country',c.country)+field('Year','d-year',c.year))+
    grid2(field('Mint / Place','d-mint',c.mint)+field('Denomination','d-denom',c.denom))+
    grid2(field('Metal','d-metal',c.metal)+field('Est. value','d-value',c.value))+
    '<div class="field"><label>'+t('tags')+'</label><div class="tagedit" id="d-tags"></div></div>'+
    '<div class="selrow"><select id="d-addcol"><option value="">'+t('addto')+'</option>'+colOpts+'</select><button class="ghost" style="flex:none;border-radius:9px;padding:10px 14px" onclick="addToCol()">+</button></div>'+
    '<div class="row2"><button class="ghost" onclick="deleteCoin('+c.id+')">'+t('del')+'</button>'+
    '<button class="primary" onclick="saveCoin('+c.id+')">'+t('save')+'</button></div>');
  renderTagEditor(c.tags);
  showBlurb(c);
}
function field(label,id,val){return '<div class="field"><label>'+label+'</label><input id="'+id+'" dir="ltr" value="'+esc(val)+'"></div>';}
function grid2(inner){return '<div style="display:flex;gap:10px">'+inner.replace(/class="field"/g,'class="field" style="flex:1"')+'</div>';}
let tagBuf=[];
function renderTagEditor(tags){
  tagBuf=[...tags];
  const box=document.getElementById('d-tags');
  box.innerHTML=tagBuf.map((tg,i)=>'<span class="t">'+esc(tagLabel(tg))+'<b onclick="rmTag('+i+')">×</b></span>').join('')+
    '<input id="d-newtag" placeholder="'+t('addtag')+'" onkeydown="if(event.key===\'Enter\'){addTag();event.preventDefault();}">';
}
function rmTag(i){tagBuf.splice(i,1);document.getElementById('d-tags').innerHTML=tagBuf.map((tg,j)=>'<span class="t">'+esc(tagLabel(tg))+'<b onclick="rmTag('+j+')">×</b></span>').join('')+'<input id="d-newtag" placeholder="'+t('addtag')+'" onkeydown="if(event.key===\'Enter\'){addTag();event.preventDefault();}">';document.getElementById('d-newtag').focus();}
function addTag(){const v=(document.getElementById('d-newtag').value||'').toLowerCase().trim();if(v&&!tagBuf.includes(v)){tagBuf.push(v);}renderTagEditor(tagBuf);document.getElementById('d-newtag').focus();}

document.getElementById('file').addEventListener('change',async e=>{
  const files=[...e.target.files];if(!files.length){e.target.value='';return;}
  if(files.length>1){ runBatch(files); e.target.value=''; return; }
  const f=files[0];
  document.getElementById('addwork').innerHTML='<div class="status">'+t('reading')+'</div>';
  try{
    const prepped=await prepImage(f);pendingImg=prepped.dataUrl;
    let info={};
    try{ info=await identify(prepped.dataUrl); }
    catch(aiErr){ info={}; /* AI hiccup — keep the photo, fill the rest by hand */ }
    showDraft(info);
  }catch(err){document.getElementById('addwork').innerHTML='<div class="err">'+t('err')+' ('+(err.message||err)+')</div>';}

/* build + save a coin straight from AI info (no form) — used for bulk add */
function buildCoinFromInfo(info,img){
  const d={name:info.name||'',country:info.country||'',year:info.year||'',mint:info.mint||'',denom:info.denomination||'',metal:info.metal||'',value:shortValue(info.est_value||''),blurb:info.blurb||'',blurb_he:info.blurb_he||'',tags:Array.isArray(info.tags)?info.tags.map(x=>(''+x).toLowerCase()):[]};
  enrichTags(d);
  const metal=(d.metal||'').toLowerCase();
  let face=null;
  if(!img){const k=metal.includes('gold')?'coin gold':metal.includes('copper')||metal.includes('bronze')?'coin copper':metal.includes('paper')?'note ngreen':'coin silver';face={k,g:(d.value||'$').slice(0,4),s:''};}
  const nc={id:nextCoinId++,created:Date.now(),img:img||null,face,name:d.name||'Untitled',country:d.country,year:d.year,mint:d.mint,denom:d.denom,metal:d.metal,value:d.value,blurb:d.blurb,blurb_he:d.blurb_he,tags:[...d.tags]};
  coins.unshift(nc);persistCoin(nc);saveOrder();attachToTarget(nc.id);return nc;
}
/* bulk: catalog a whole batch of photos one after another */
let batch={running:false,done:0,failed:0,total:0};
function batchChip(){
  let el=document.getElementById('batchchip');
  if(!el){el=document.createElement('div');el.id='batchchip';el.className='batchchip';document.body.appendChild(el);}
  if(!batch.total){el.style.display='none';return;}
  el.style.display='flex';
  if(batch.running){
    el.innerHTML='<span class="spin"></span><span>'+t('catal')+' '+(batch.done+batch.failed)+' / '+batch.total+' …</span>';
  }else{
    el.innerHTML='<span>✓ '+t('added')+' '+batch.done+(batch.failed?(' · '+batch.failed+' '+t('skipped')):'')+'</span>';
    setTimeout(()=>{if(!batch.running){el.style.display='none';batch.total=0;}},4000);
  }
}
async function runBatch(files){
  if(batch.running) return;               // one batch at a time
  batch={running:true,done:0,failed:0,total:files.length};
  closeModal();                            // let her keep using the app
  batchChip();
  for(let i=0;i<files.length;i++){
    try{
      const p=await prepImage(files[i]);
      let info={};try{info=await identify(p.dataUrl);}catch(_){info={};}
      buildCoinFromInfo(info,p.dataUrl);
      batch.done++;
    }catch(e){batch.failed++;}
    batchChip();
    // live-refresh the list as coins land (unless she's reading a coin)
    if(view==='all' && !document.getElementById('modal').classList.contains('show')) render();
  }
  batch.running=false; saveOrder(); batchChip();
  const tgt=uploadTarget; uploadTarget=null;
  if(tgt){ openCollection(tgt); }
  else if(view==='all' && !document.getElementById('modal').classList.contains('show')) render();
}
function prepImage(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const o=r.result,m=(o.match(/^data:(.*?);/)||[])[1]||'image/jpeg';const fb=()=>res({dataUrl:o,b64:o.split(',')[1],mime:m});const img=new Image();img.onload=()=>{try{const mx=900,s=Math.min(1,mx/Math.max(img.width,img.height)),w=Math.max(1,img.width*s|0),h=Math.max(1,img.height*s|0),cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);const d=cv.toDataURL('image/jpeg',.8);res({dataUrl:d,b64:d.split(',')[1],mime:'image/jpeg'});}catch(e){fb();}};img.onerror=fb;img.src=o;};r.onerror=()=>rej(new Error('open failed'));r.readAsDataURL(file);});}
async function identify(imageDataUrl){
  const resp=await fetch("/.netlify/functions/read-coin",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({image:imageDataUrl})});
  if(!resp.ok){let msg='';try{msg=(await resp.json()).error||'';}catch(_){ } throw new Error('AI '+resp.status+(msg?': '+msg:''));}
  return await resp.json();
}
/* derive consistent tags from the filled-in fields, merge with AI's, drop generic junk */
const JUNK_TAGS=['coins','collectible','collectable','numismatic','money','currency','banknote','note','paper money'];
function enrichTags(d){
  const out=[];
  const add=tg=>{tg=(tg||'').toLowerCase().trim();if(tg&&!JUNK_TAGS.includes(tg)&&!out.includes(tg))out.push(tg);};
  // coin vs bill — the type goes first so he can filter to just one
  const metal=(d.metal||'').toLowerCase();
  const hay=(d.name+' '+d.denom+' '+(d.tags||[]).join(' ')).toLowerCase();
  const isPaper = metal.includes('paper') || /\b(note|bill|banknote|paper money)\b/.test(hay);
  add(isPaper?'bill':'coin');
  // metal (skip 'paper' since 'bill' already says it)
  ['gold','silver','copper','bronze','nickel','platinum'].forEach(m=>{if(metal.includes(m))add(m);});
  // region from country
  const ct=(d.country||'').toLowerCase();
  if(/united states|u\.?s\.?a?\b|america/.test(ct))add('us');
  else if(/greece|greek|athen/.test(ct))add('greek');
  else if(/rome|roman/.test(ct))add('roman');
  else if(/jud(ea|aea)|israel|hebrew|jewish/.test(ct))add('judea');
  else if(/britain|british|england|united kingdom|\buk\b/.test(ct))add('british');
  // era from year
  const yr=(d.year||'');
  if(/bc|bce/i.test(yr)) add('ancient');
  else{const m=yr.match(/\b(1[0-9]{3}|20[0-9]{2})\b/);if(m){const y=+m[1];add((Math.floor(y/100)*100)+'s');}}
  // denomination (strip leading numbers like "50 cents" -> "cents")
  let dn=(d.denom||'').toLowerCase().replace(/^[\d.,\s$]+/,'').trim();
  if(dn&&dn.length<=22)add(dn);
  // keep AI's own tags too (the specific, characterful ones like 'owl')
  (d.tags||[]).forEach(add);
  d.tags=out;
}
function showDraft(info){
  pendingDraft={name:info.name||'',country:info.country||'',year:info.year||'',mint:info.mint||'',denom:info.denomination||'',metal:info.metal||'',value:shortValue(info.est_value||''),blurb:info.blurb||'',blurb_he:info.blurb_he||'',tags:Array.isArray(info.tags)?info.tags.map(x=>(''+x).toLowerCase()):[]};
  enrichTags(pendingDraft);
  draftSheet();
}

function renderAddTags(){const box=document.getElementById('a-tags');box.innerHTML=pendingDraft.tags.map((tg,i)=>'<span class="t">'+esc(tagLabel(tg))+'<b onclick="rmAddTag('+i+')">×</b></span>').join('')+'<input id="a-newtag" placeholder="'+t('addtag')+'" onkeydown="if(event.key===\'Enter\'){addAddTag();event.preventDefault();}">';}
function rmAddTag(i){pendingDraft.tags.splice(i,1);renderAddTags();}
function addAddTag(){const v=(document.getElementById('a-newtag').value||'').toLowerCase().trim();if(v&&!pendingDraft.tags.includes(v))pendingDraft.tags.push(v);renderAddTags();document.getElementById('a-newtag').focus();}
function commitAdd(){
  const metal=(val('a-metal')||'').toLowerCase();
  let face;
  if(pendingImg) face=null;
  else{const k=metal.includes('gold')?'coin gold':metal.includes('copper')||metal.includes('bronze')?'coin copper':metal.includes('paper')?'note ngreen':'coin silver';face={k,g:(val('a-value')||'$').slice(0,4),s:''};}
  const nc={id:nextCoinId++,created:Date.now(),img:pendingImg||null,face,name:val('a-name')||'Untitled',country:val('a-country'),year:val('a-year'),mint:val('a-mint'),denom:val('a-denom'),metal:val('a-metal'),value:val('a-value'),blurb:pendingDraft.blurb||'',blurb_he:pendingDraft.blurb_he||'',tags:[...pendingDraft.tags]};
  coins.unshift(nc);persistCoin(nc);saveOrder();attachToTarget(nc.id);
  const tgt=uploadTarget; uploadTarget=null;
  pendingImg=null;pendingDraft=null;closeModal();
  if(tgt){openCollection(tgt);}else{setView('all');}
}

    fab.style.display='none'; bar.style.display='flex';
    bar.innerHTML='<button class="selall" onclick="selectAllShown()">'+(allShownSelected()?t('deselectall'):t('selectall'))+'</button>'+

function allShownSelected(){const ids=matches().map(c=>c.id);return ids.length>0&&ids.every(id=>selected.has(id));}
function selectAllShown(){const ids=matches().map(c=>c.id);if(allShownSelected()){ids.forEach(id=>selected.delete(id));}else{ids.forEach(id=>selected.add(id));}render();}
function toggleSelectMode(){selectMode=!selectMode;if(!selectMode)selected.clear();render();}
function toggleSelect(id){selected.has(id)?selected.delete(id):selected.add(id);render();}
function openAddSelected(){

/* ---------- cover splash ---------- */
/* ====== real login (Firebase Authentication) ====== */
let authReady=false, signedIn=false;
function setupGate(){
  const gate=document.getElementById('gate'),tap=document.getElementById('taphint'),sp=document.getElementById('splash');
  if(!sp)return;
  // wait for auth, then react to login state
  if(window.AUTH){
    window.AUTH.onChange(user=>{
      authReady=true; signedIn=!!user;
      if(user){
        // logged in: show the cover with a simple tap-to-enter
        gate.style.display='none'; tap.style.display='block'; sp.onclick=enterSite;
        if(window.FB) loadFromFirestore().then(render);
      }else{
        // not logged in: show the login fields, lock the rest
        gate.style.display='flex'; tap.style.display='none'; sp.onclick=null;
        if(sp.classList.contains('gone')){sp.classList.remove('gone');document.body.appendChild(sp);} // re-show if they signed out
      }
    });
  }else{
    // auth library didn't load — fail closed (stay on cover)
    gate.style.display='flex'; tap.style.display='none'; sp.onclick=null;
  }
}
async function tryEnter(){
  const email=(document.getElementById('pw-email').value||'').trim();
  const pw=(document.getElementById('pw').value||'');
  const err=document.getElementById('pwerr');
  if(!email||!pw){err.textContent='Enter email and password';return;}
  err.textContent='…';
  try{
    await window.AUTH.signIn(email,pw);
    err.textContent='';
    enterSite();
  }catch(e){
    err.textContent='Wrong email or password';
    const sp=document.getElementById('splash');sp.classList.add('shake');setTimeout(()=>sp.classList.remove('shake'),420);
    document.getElementById('pw').value='';
  }
}
function logout(){ if(window.AUTH){window.AUTH.signOut().then(()=>location.reload());} }

function enterSite(){const s=document.getElementById('splash');if(!s)return;s.classList.add('gone');setTimeout(()=>{ if(s.classList.contains('gone')) s.style.display='none'; },500);}

render();
window.addEventListener('fb-ready', setupGate);
if(window.AUTH) setupGate();
